<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disease Prediction - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .hero-container {
            text-align: center;
            color: white;
            padding: 40px;
            max-width: 700px;
        }
        
        .hero-container h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .hero-container p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.95;
            line-height: 1.6;
        }
        
        .btn-custom {
            background: white;
            color: #667eea;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }
        
        .btn-custom:hover {
            background: #f0f0f0;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            color: #764ba2;
        }
        
        .features {
            display: flex;
            justify-content: space-around;
            margin-top: 60px;
            flex-wrap: wrap;
        }
        
        .feature-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 10px;
            flex: 1;
            min-width: 200px;
            backdrop-filter: blur(10px);
        }
        
        .feature-box h3 {
            font-size: 1.5rem;
            margin: 10px 0;
        }
        
        .feature-box p {
            font-size: 0.95rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="hero-container">
        <h1>🏥 Disease Prediction</h1>
        <p>
            Advanced machine learning model to predict disease risk based on your health metrics.
            Get instant predictions with confidence scores.
        </p>
        
        <div>
            <a href="{% url 'predictor:predict' %}" class="btn-custom">Start Prediction</a>
        </div>
        
        <div class="features">
            <div class="feature-box">
                <h3>⚡ Fast</h3>
                <p>Get predictions in seconds</p>
            </div>
            <div class="feature-box">
                <h3>📊 Accurate</h3>
                <p>87% accuracy on test data</p>
            </div>
            <div class="feature-box">
                <h3>🔒 Private</h3>
                <p>Your data stays secure</p>
            </div>
        </div>
    </div>
</body>
</html>
